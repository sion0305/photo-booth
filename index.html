<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>포토부스</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,800;1,9..144,600&family=Pretendard:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F3EEE5;
    --ink: #111111;
    --pop: #FF5233;
    --muted: #8A8376;
    --card: #FFFFFF;
    --line: #1a1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
  }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-user-select: none;
  }

  /* grain overlay */
  body::after {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.5'/></svg>");
    opacity: 0.06;
    z-index: 9999;
    mix-blend-mode: multiply;
  }

  .app {
    position: relative;
    width: 100%;
    height: 100dvh;
    max-width: 540px;
    margin: 0 auto;
    background: var(--bg);
    overflow: hidden;
  }

  .screen {
    position: absolute; inset: 0;
    display: none;
    flex-direction: column;
  }
  .screen.active { display: flex; }

  /* ========= INTRO ========= */
  .intro {
    padding: 28px 24px 32px;
    justify-content: space-between;
  }
  .intro__top { display: flex; justify-content: space-between; align-items: center; }
  .mono { font-family: 'Fraunces', serif; font-style: italic; letter-spacing: .02em; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; letter-spacing: .14em; text-transform: uppercase;
    padding: 6px 10px;
    border: 1.5px solid var(--line);
    border-radius: 999px;
  }
  .badge .dot { width: 6px; height: 6px; background: var(--pop); border-radius: 50%; }
  .intro__title {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: clamp(56px, 16vw, 96px);
    line-height: 0.92;
    letter-spacing: -0.03em;
    margin-top: 8vh;
  }
  .intro__title em { font-style: italic; font-weight: 300; color: var(--pop); }
  .intro__lead {
    margin-top: 24px;
    max-width: 28ch;
    color: var(--muted);
    line-height: 1.55;
    font-size: 15px;
  }

  .steps { margin-top: 28px; display: grid; gap: 10px; }
  .step {
    display: grid; grid-template-columns: 28px 1fr auto; align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border: 1.5px solid var(--line);
    background: var(--card);
    border-radius: 14px;
  }
  .step__n {
    font-family: 'Fraunces', serif;
    font-weight: 600; font-style: italic;
    font-size: 22px; line-height: 1;
  }
  .step__t { font-weight: 500; font-size: 14px; }
  .step__m { font-size: 12px; color: var(--muted); font-family: 'Fraunces', serif; font-style: italic; }

  .cta {
    margin-top: 28px;
    width: 100%;
    padding: 22px;
    background: var(--ink);
    color: var(--bg);
    border: none;
    border-radius: 20px;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -.01em;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer;
    transition: transform .15s ease;
  }
  .cta:active { transform: scale(0.98); }
  .cta__arrow {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--pop); color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  /* ========= CAMERA ========= */
  .camera { background: #000; }
  .cam-hud {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 18px 20px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 5;
    color: #fff;
    pointer-events: none;
  }
  .cam-hud__counter {
    font-family: 'Fraunces', serif;
    font-size: 26px; font-weight: 600;
    letter-spacing: -.02em;
    padding: 6px 12px;
    background: rgba(0,0,0,.35);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 999px;
  }
  .cam-hud__counter em { font-style: italic; color: var(--pop); font-weight: 300; }
  .cam-close {
    pointer-events: auto;
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(0,0,0,.35);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: none; color: #fff; font-size: 20px;
    cursor: pointer;
  }

  .video-wrap {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  #video {
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1); /* mirror preview */
  }

  .countdown {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif;
    font-weight: 300; font-style: italic;
    font-size: 240px;
    color: #fff;
    text-shadow: 0 4px 40px rgba(0,0,0,.4);
    pointer-events: none;
    z-index: 4;
  }
  .countdown.pop {
    animation: pop 1s ease-out forwards;
  }
  @keyframes pop {
    0% { transform: scale(1.35); opacity: 0; }
    15% { transform: scale(1); opacity: 1; }
    85% { transform: scale(1); opacity: 1; }
    100% { transform: scale(0.85); opacity: 0; }
  }

  .flash {
    position: absolute; inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 6;
  }
  .flash.on { animation: flash .35s ease-out; }
  @keyframes flash {
    0% { opacity: 0; }
    10% { opacity: 1; }
    100% { opacity: 0; }
  }

  .thumbstrip {
    position: absolute; bottom: 24px; left: 0; right: 0;
    display: flex; gap: 6px; justify-content: center;
    z-index: 5;
    padding: 0 20px;
  }
  .tick {
    flex: 1; max-width: 30px;
    height: 4px;
    background: rgba(255,255,255,.25);
    border-radius: 2px;
  }
  .tick.on { background: var(--pop); }

  /* ========= SELECT ========= */
  .select {
    padding: 20px 18px 24px;
  }
  .select__head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 16px;
  }
  .select__title {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 32px;
    letter-spacing: -.02em;
    line-height: 1;
  }
  .select__title em { font-style: italic; font-weight: 300; color: var(--pop); }
  .select__sub { font-size: 12px; color: var(--muted); font-family: 'Fraunces', serif; font-style: italic; }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    flex: 1;
    overflow-y: auto;
    padding-bottom: 100px;
  }
  .thumb {
    position: relative;
    aspect-ratio: 3/4;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    background: #ddd;
    border: 2px solid transparent;
    transition: transform .15s ease;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb__badge {
    position: absolute; top: 8px; right: 8px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(0,0,0,.5);
    backdrop-filter: blur(6px);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 14px;
    border: 1.5px solid rgba(255,255,255,.3);
  }
  .thumb.selected {
    border-color: var(--pop);
    transform: scale(0.97);
  }
  .thumb.selected .thumb__badge {
    background: var(--pop);
    color: var(--ink);
    border-color: var(--ink);
  }

  .select__footer {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 16px 18px 22px;
    background: linear-gradient(to top, var(--bg) 60%, transparent);
  }
  .select__count {
    display: flex; justify-content: center; align-items: center;
    margin-bottom: 12px;
    font-size: 13px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .select__count strong { color: var(--ink); margin: 0 4px; font-family: 'Fraunces', serif; font-size: 16px; }
  .btn-make {
    width: 100%;
    padding: 20px;
    background: var(--ink);
    color: var(--bg);
    border: none;
    border-radius: 18px;
    font-size: 16px; font-weight: 700;
    cursor: pointer;
    transition: opacity .2s;
  }
  .btn-make:disabled { opacity: .35; cursor: not-allowed; }

  /* ========= RESULT ========= */
  .result {
    padding: 20px 18px 24px;
    align-items: center;
  }
  .result__head {
    width: 100%;
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .result__title {
    font-family: 'Fraunces', serif;
    font-weight: 800; font-style: italic;
    font-size: 28px; letter-spacing: -.02em;
  }
  .result__canvas-wrap {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    width: 100%;
    padding: 20px 0;
  }
  #resultImg {
    max-width: 100%;
    max-height: 65dvh;
    box-shadow: 0 20px 50px rgba(0,0,0,.18);
    border-radius: 4px;
  }
  .result__actions {
    width: 100%;
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .btn-ghost {
    padding: 18px;
    background: transparent;
    color: var(--ink);
    border: 1.5px solid var(--line);
    border-radius: 16px;
    font-size: 15px; font-weight: 600;
    cursor: pointer;
  }
  .btn-primary {
    padding: 18px;
    background: var(--pop);
    color: var(--ink);
    border: 1.5px solid var(--line);
    border-radius: 16px;
    font-size: 15px; font-weight: 700;
    cursor: pointer;
  }

  .hidden-canvas { display: none; }
  .error-msg {
    margin-top: 20px;
    padding: 14px;
    background: #fff;
    border: 1.5px solid var(--line);
    border-radius: 12px;
    font-size: 13px;
    color: var(--ink);
    line-height: 1.5;
    display: none;
  }
  .error-msg.show { display: block; }
</style>
</head>
<body>
<div class="app">

  <!-- INTRO -->
  <section class="screen intro active" id="screenIntro">
    <div>
      <div class="intro__top">
        <span class="badge"><span class="dot"></span> READY</span>
        <span class="mono" style="font-size:14px;">no.001</span>
      </div>
      <h1 class="intro__title">Photo<br><em>Booth</em></h1>
      <p class="intro__lead">5초 타이머로 여덟 컷을 찍고, 마음에 드는 네 컷을 골라 한 장으로 만들어요.</p>

      <div class="steps">
        <div class="step">
          <div class="step__n">1</div>
          <div class="step__t">카메라로 8장 촬영</div>
          <div class="step__m">5s each</div>
        </div>
        <div class="step">
          <div class="step__n">2</div>
          <div class="step__t">마음에 드는 4장 선택</div>
          <div class="step__m">pick 4/8</div>
        </div>
        <div class="step">
          <div class="step__n">3</div>
          <div class="step__t">2×2 그리드로 저장</div>
          <div class="step__m">download</div>
        </div>
      </div>

      <div class="error-msg" id="errorMsg"></div>
    </div>

    <button class="cta" id="btnStart">
      <span>START SHOOTING</span>
      <span class="cta__arrow">→</span>
    </button>
  </section>

  <!-- CAMERA -->
  <section class="screen camera" id="screenCamera">
    <div class="cam-hud">
      <button class="cam-close" id="btnClose">✕</button>
      <div class="cam-hud__counter"><span id="shotIndex">1</span><em> / 8</em></div>
    </div>
    <div class="video-wrap">
      <video id="video" autoplay playsinline muted></video>
    </div>
    <div class="countdown" id="countdown"></div>
    <div class="flash" id="flash"></div>
    <div class="thumbstrip" id="ticks"></div>
  </section>

  <!-- SELECT -->
  <section class="screen select" id="screenSelect">
    <div class="select__head">
      <div>
        <div class="select__title"><em>Pick</em> Four</div>
      </div>
      <div class="select__sub">tap to select</div>
    </div>
    <div class="grid" id="gridThumbs"></div>
    <div class="select__footer">
      <div class="select__count">selected <strong id="selCount">0</strong> / 4</div>
      <button class="btn-make" id="btnMake" disabled>MAKE PHOTO STRIP</button>
    </div>
  </section>

  <!-- RESULT -->
  <section class="screen result" id="screenResult">
    <div class="result__head">
      <div class="result__title">Done.</div>
      <span class="badge"><span class="dot"></span> SAVED</span>
    </div>
    <div class="result__canvas-wrap">
      <img id="resultImg" alt="photo result" />
    </div>
    <div class="result__actions">
      <button class="btn-ghost" id="btnRetry">RETAKE</button>
      <button class="btn-primary" id="btnDownload">DOWNLOAD ↓</button>
    </div>
  </section>

  <canvas class="hidden-canvas" id="captureCanvas"></canvas>
  <canvas class="hidden-canvas" id="gridCanvas"></canvas>
</div>

<script>
(() => {
  const TOTAL_SHOTS = 8;
  const TIMER_SECONDS = 5;
  const PICK_COUNT = 4;

  // State
  let stream = null;
  let photos = [];        // dataURL 배열
  let selected = new Set();
  let shooting = false;
  let finalDataUrl = null;

  // Elements
  const $ = (id) => document.getElementById(id);
  const screens = {
    intro: $('screenIntro'),
    camera: $('screenCamera'),
    select: $('screenSelect'),
    result: $('screenResult'),
  };
  const video = $('video');
  const countdownEl = $('countdown');
  const flashEl = $('flash');
  const ticksEl = $('ticks');
  const shotIndexEl = $('shotIndex');
  const gridThumbs = $('gridThumbs');
  const btnMake = $('btnMake');
  const selCountEl = $('selCount');
  const resultImg = $('resultImg');
  const errorMsg = $('errorMsg');

  const captureCanvas = $('captureCanvas');
  const gridCanvas = $('gridCanvas');

  function showScreen(name) {
    Object.values(screens).forEach(s => s.classList.remove('active'));
    screens[name].classList.add('active');
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
  }

  // ---------- 카메라 시작 ----------
  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: 'user',
          width:  { ideal: 1280 },
          height: { ideal: 1920 },
        },
        audio: false,
      });
      video.srcObject = stream;
      await video.play();
      return true;
    } catch (err) {
      console.error(err);
      showError('카메라 접근이 거부되었어요. 브라우저 주소창의 🔒 권한 설정에서 카메라를 허용하고 새로고침 해주세요. (HTTPS 또는 localhost 환경에서만 동작합니다)');
      return false;
    }
  }

  function stopCamera() {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
  }

  // ---------- 틱(진행바) 초기화 ----------
  function renderTicks() {
    ticksEl.innerHTML = '';
    for (let i = 0; i < TOTAL_SHOTS; i++) {
      const t = document.createElement('div');
      t.className = 'tick' + (i < photos.length ? ' on' : '');
      ticksEl.appendChild(t);
    }
  }

  // ---------- 한 컷 촬영 ----------
  function captureFrame() {
    const w = video.videoWidth;
    const h = video.videoHeight;
    captureCanvas.width = w;
    captureCanvas.height = h;
    const ctx = captureCanvas.getContext('2d');

    // 사용자가 보는 것과 동일하게 좌우반전 저장 (셀카 느낌)
    ctx.save();
    ctx.translate(w, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, w, h);
    ctx.restore();

    return captureCanvas.toDataURL('image/jpeg', 0.92);
  }

  function flashOnce() {
    flashEl.classList.remove('on');
    // force reflow
    void flashEl.offsetWidth;
    flashEl.classList.add('on');
  }

  function showCountdown(n) {
    countdownEl.textContent = n;
    countdownEl.classList.remove('pop');
    void countdownEl.offsetWidth;
    countdownEl.classList.add('pop');
  }

  // 5초 카운트다운 1회
  function runTimer() {
    return new Promise((resolve) => {
      let n = TIMER_SECONDS;
      showCountdown(n);
      const id = setInterval(() => {
        n--;
        if (n <= 0) {
          clearInterval(id);
          countdownEl.textContent = '';
          resolve();
        } else {
          showCountdown(n);
        }
      }, 1000);
    });
  }

  // 8회 반복 촬영
  async function shootSequence() {
    shooting = true;
    photos = [];
    renderTicks();

    for (let i = 0; i < TOTAL_SHOTS; i++) {
      shotIndexEl.textContent = (i + 1);
      await runTimer();

      // 찰칵
      flashOnce();
      const data = captureFrame();
      photos.push(data);
      renderTicks();

      // 찰칵 후 잠깐 쉼
      await new Promise(r => setTimeout(r, 500));
    }

    shooting = false;
    stopCamera();
    goToSelect();
  }

  // ---------- 선택 화면 ----------
  function goToSelect() {
    selected.clear();
    updateSelCount();
    gridThumbs.innerHTML = '';

    photos.forEach((src, idx) => {
      const el = document.createElement('div');
      el.className = 'thumb';
      el.dataset.idx = idx;
      el.innerHTML = `
        <img src="${src}" alt="shot ${idx + 1}">
        <div class="thumb__badge"></div>
      `;
      el.addEventListener('click', () => toggleSelect(idx, el));
      gridThumbs.appendChild(el);
    });

    showScreen('select');
  }

  function toggleSelect(idx, el) {
    if (selected.has(idx)) {
      selected.delete(idx);
      el.classList.remove('selected');
    } else {
      if (selected.size >= PICK_COUNT) return; // 4장 초과 금지
      selected.add(idx);
      el.classList.add('selected');
    }
    updateOrderBadges();
    updateSelCount();
  }

  function updateOrderBadges() {
    const order = [...selected];
    document.querySelectorAll('.thumb').forEach(el => {
      const idx = +el.dataset.idx;
      const badge = el.querySelector('.thumb__badge');
      const pos = order.indexOf(idx);
      badge.textContent = pos >= 0 ? (pos + 1) : '';
    });
  }

  function updateSelCount() {
    selCountEl.textContent = selected.size;
    btnMake.disabled = selected.size !== PICK_COUNT;
  }

  // ---------- 그리드 합성 ----------
  function buildGrid() {
    const order = [...selected];
    if (order.length !== PICK_COUNT) return;

    // 2x2 그리드. 각 셀 600x800 (3:4 비율), 프레임 여백 40, 하단 라벨 100
    const CELL_W = 600, CELL_H = 800;
    const GAP = 16;
    const PAD = 40;
    const FOOTER = 110;

    const W = PAD * 2 + CELL_W * 2 + GAP;
    const H = PAD + CELL_H * 2 + GAP + FOOTER;

    gridCanvas.width = W;
    gridCanvas.height = H;
    const ctx = gridCanvas.getContext('2d');

    // 프레임 배경
    ctx.fillStyle = '#111111';
    ctx.fillRect(0, 0, W, H);

    // 이미지 4장을 차례로 그리기
    const positions = [
      [PAD,                PAD],
      [PAD + CELL_W + GAP, PAD],
      [PAD,                PAD + CELL_H + GAP],
      [PAD + CELL_W + GAP, PAD + CELL_H + GAP],
    ];

    const loadPromises = order.map((idx) => new Promise((res) => {
      const img = new Image();
      img.onload = () => res(img);
      img.src = photos[idx];
    }));

    return Promise.all(loadPromises).then((imgs) => {
      imgs.forEach((img, i) => {
        const [x, y] = positions[i];
        drawCover(ctx, img, x, y, CELL_W, CELL_H);
      });

      // 하단 라벨
      ctx.fillStyle = '#F3EEE5';
      ctx.textBaseline = 'middle';

      const now = new Date();
      const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;

      ctx.font = 'italic 600 42px Fraunces, serif';
      ctx.textAlign = 'left';
      ctx.fillText('Photo Booth', PAD, H - FOOTER/2);

      ctx.font = '500 28px Pretendard, sans-serif';
      ctx.textAlign = 'right';
      ctx.fillStyle = '#FF5233';
      ctx.fillText(dateStr, W - PAD, H - FOOTER/2);

      finalDataUrl = gridCanvas.toDataURL('image/jpeg', 0.95);
      resultImg.src = finalDataUrl;
      showScreen('result');
    });
  }

  // object-fit: cover 느낌으로 그리기
  function drawCover(ctx, img, dx, dy, dw, dh) {
    const ir = img.width / img.height;
    const tr = dw / dh;
    let sx, sy, sw, sh;
    if (ir > tr) {
      // 이미지가 더 가로로 김 → 좌우 자르기
      sh = img.height;
      sw = sh * tr;
      sx = (img.width - sw) / 2;
      sy = 0;
    } else {
      sw = img.width;
      sh = sw / tr;
      sx = 0;
      sy = (img.height - sh) / 2;
    }
    ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
  }

  // ---------- 이벤트 ----------
  $('btnStart').addEventListener('click', async () => {
    errorMsg.classList.remove('show');
    showScreen('camera');
    const ok = await startCamera();
    if (!ok) { showScreen('intro'); return; }
    // 카메라 준비 후 자동 촬영 시작
    setTimeout(() => shootSequence(), 600);
  });

  $('btnClose').addEventListener('click', () => {
    if (shooting) {
      // 중단
      shooting = false;
    }
    stopCamera();
    showScreen('intro');
  });

  $('btnMake').addEventListener('click', () => buildGrid());

  $('btnRetry').addEventListener('click', () => {
    photos = [];
    selected.clear();
    finalDataUrl = null;
    showScreen('intro');
  });

  $('btnDownload').addEventListener('click', () => {
    if (!finalDataUrl) return;
    const a = document.createElement('a');
    const ts = Date.now();
    a.href = finalDataUrl;
    a.download = `photobooth_${ts}.jpg`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });

  // iOS 백그라운드 복귀 시 스트림 정리
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && stream) {
      stopCamera();
    }
  });

  // 진입 전 HTTPS 체크
  if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    showError('⚠️ 카메라는 HTTPS 또는 localhost 환경에서만 동작합니다. 배포 시 HTTPS로 서빙해주세요.');
  }

})();
</script>
